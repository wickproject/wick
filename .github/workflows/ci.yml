name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Download libcronet.a (macOS arm64)
        run: bash scripts/download-libcronet-macos.sh
        working-directory: rust

      - name: Build (Cronet)
        run: cargo build --features cronet
        working-directory: rust

      - name: Build (reqwest fallback)
        run: cargo build
        working-directory: rust

      - name: Verify
        run: target/debug/wick version
        working-directory: rust

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Download libcronet.so (Linux amd64)
        run: bash scripts/download-cronet-linux.sh
        working-directory: rust

      - name: Build (Cronet)
        run: cargo build --features cronet
        working-directory: rust

      - name: Build (reqwest fallback)
        run: cargo build
        working-directory: rust

      - name: Verify
        run: |
          target/debug/wick version
          target/debug/wick --help
        working-directory: rust

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Test (without Cronet)
        run: cargo test
        working-directory: rust
